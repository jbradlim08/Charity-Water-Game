<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game_container">
        <header>
            <nav>
                <div class="score">
                    <div>
                        <img src="media/clean_water.png">
                        <p id="clean_water_score">0</p>
                    </div>
                    <div>
                        <img src="media/dirty_water.png">
                        <p id="dirty_water_score">0</p>
                    </div>
                </div>
                <div id="emoji">
                    😁
                </div>
                <div class="timer">
                    <div>🕒</div>
                    <p id="game_timer">30</p>
                </div>
            </nav>
        </header>
        <main>
            <canvas id="game_board" width="500" height="500">
                
            </canvas>
            <div></div>
            <button id="restart_button">Restart</button>
        </main>
        <footer class="charity-links">
            <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">Visit charity: water</a>
            <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate to charity: water</a>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game_container">
        <header>
            <nav>
                <div class="score">
                    <p id="clean_water_score">0</p>
                    <p id="dirty_water_score">0</p>
                </div>
                <div class="emoji">
                    😁
                </div>
                <div class="timer">
                    <div>🕒</div>
                    <p>10.0</p>
                </div>
            </nav>
        </header>
        <main>
            <canvas id="game_board" width="500" height="500">
                
            </canvas>
            <div></div>
            <button id="reset_button">Reset</button>
        </main>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
